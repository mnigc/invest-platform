version: '3.8'

services:
  invest-platform:
    build: .
    container_name: invest-platform
    ports:
      - "4321:4321"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    restart: unless-stopped
    networks:
      - invest-network

networks:
  invest-network:
    driver: bridge
