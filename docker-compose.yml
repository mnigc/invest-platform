version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: invest-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - invest-network

  invest-api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: invest-api
    ports:
      - "3001:3001"
    environment:
      - API_PORT=3001
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-invest_platform}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - invest-network

  invest-web:
    build: .
    container_name: invest-web
    ports:
      - "4321:4321"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
      - API_BASE=http://invest-api:3001/api/v1
    depends_on:
      - invest-api
    restart: unless-stopped
    networks:
      - invest-network

networks:
  invest-network:
    driver: bridge
